name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 backbone/ --max-line-length=120 --extend-ignore=E501,W503

      - name: Verify CLI runs
        run: |
          python -m backbone.cli --help

      - name: Build Docker image
        run: |
          docker build -t backbone:ci .

      - name: Verify Docker image runs
        run: |
          docker run --rm backbone:ci --help
